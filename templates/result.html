<!DOCTYPE html>
<html>
<head>
<style>
body {font-family: Arial; background:#f5f5f5; text-align:center;}
.card {
  background:white; padding:20px; margin:20px auto;
  width:300px; border-radius:10px; box-shadow:0 0 10px gray;
}
button {
  background:#ff9900; color:white; border:none;
  padding:10px; border-radius:5px;
}
</style>
</head>

<body>

<h1>🔥 Best Laptops For You</h1>

{% for laptop in laptops %}
<div class="card">
  <h2>{{ laptop.name }}</h2>
  <p>💰 ₹{{ laptop.price }}</p>
  <p>⚡ {{ laptop.ram }}GB RAM</p>

  <!-- BUY BUTTON -->
<a href="{{ laptop.link }}">
  <button>Buy Now 🛒</button>
  </a>

</div>
{% endfor %}

</body>
</html>
